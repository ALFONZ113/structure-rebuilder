
<!-- Hidden fallback HTML for Netlify Forms in SPA application -->
<form name="contact" netlify netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="contact" />
  <input type="text" name="name" />
  <input type="email" name="email" />
  <input type="tel" name="phone" />
  <textarea name="message"></textarea>
</form>

<form name="lead" netlify netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="lead" />
  <input type="text" name="firstName" />
  <input type="text" name="lastName" />
  <input type="email" name="email" />
  <input type="tel" name="phone" />
  <input type="text" name="zipCode" />
  <input type="text" name="city" />
  <input type="text" name="street" />
  <input type="text" name="currentProvider" />
  <input type="text" name="monthlyPayment" />
  <input type="text" name="services" />
  <textarea name="additionalRequirements"></textarea>
  <input type="checkbox" name="gdprConsent" />
</form>

<form name="speedtest-results" netlify netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="speedtest-results" />
  <input type="email" name="email" />
  <input type="text" name="notes" />
  <input type="text" name="location" />
  <input type="text" name="downloadSpeed" />
  <input type="text" name="uploadSpeed" />
  <input type="text" name="ping" />
  <input type="text" name="packetLoss" />
  <input type="text" name="consistency" />
  <input type="text" name="testDate" />
  <input type="text" name="userAgent" />
</form>
