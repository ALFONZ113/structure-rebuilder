<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#15B88C"/>
  <!-- Simplified WiFi mark — 3 bold arcs + dot, centered and scaled for 16px clarity -->
  <g transform="translate(256, 280)">
    <!-- Outer arc -->
    <path d="M-160,-100 A 220 220 0 0 1 160,-100" fill="none" stroke="#fff" stroke-width="48" stroke-linecap="round"/>
    <!-- Middle arc -->
    <path d="M-100,-60 A 140 140 0 0 1 100,-60" fill="none" stroke="#fff" stroke-width="48" stroke-linecap="round"/>
    <!-- Inner arc -->
    <path d="M-45,-20 A 60 60 0 0 1 45,-20" fill="none" stroke="#fff" stroke-width="44" stroke-linecap="round"/>
    <!-- Signal dot -->
    <circle cx="0" cy="30" r="36" fill="#fff"/>
  </g>
</svg>